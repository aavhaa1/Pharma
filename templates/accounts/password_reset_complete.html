{% extends 'base.html' %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card text-center">
            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Reset Successful!</h3>
            </div>
            <div class="card-body py-4">
                <div class="text-success mb-3" style="font-size: 2.5rem;">
                    
                </div>
                <h4 class="mb-3">Password updated!</h4>
                <p class="text-secondary small mb-4">
                    Your password has been set. You may now log in with your new credentials.
                </p>
                <a href="{% url 'login' %}" class="btn btn-primary btn-sm px-4">
                    Log In Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
