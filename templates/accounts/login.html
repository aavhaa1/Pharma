{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card">

<div class="card-header bg-primary text-white">
<h3>Login</h3>
</div>

<div class="card-body">

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<div class="mb-3 text-end">
    <a href="{% url 'password_reset' %}" class="text-decoration-none" style="color: var(--text-secondary); font-size: 0.9rem;">
        Forgot Password?
    </a>
</div>

<button class="btn btn-primary w-100">
Login
</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
