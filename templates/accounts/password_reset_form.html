{% extends 'base.html' %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card animate-fade-in">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Reset Password</h3>
            </div>
            <div class="card-body">
                <p class="lead text-secondary" style="font-size: 0.95rem;">
                    Forgot your password? Enter your email address below, and we will email you instructions to set a new one.
                </p>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100 mt-2">
                        Send Reset Email
                    </button>
                </form>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none text-info small">
                        Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
