<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PharmaCare{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">

        <a class="navbar-brand" href="/">PharmaCare</a>

        <div class="ms-auto">

            {% if user.is_authenticated %}

                <span class="text-white me-3">
                    Welcome, {{ user.username }}
                </span>

                <a href="{% url 'change_password' %}" class="btn btn-warning btn-sm">
                    Change Password
                </a>

                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                    Logout
                </a>

            {% else %}

                <a href="{% url 'login' %}" class="btn btn-light btn-sm">
                    Login
                </a>

            {% endif %}

        </div>

    </div>
</nav>
</nav>

<div class="container mt-4">

    {% block content %}

    {% endblock %}

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
